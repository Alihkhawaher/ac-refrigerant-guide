<!DOCTYPE html>
<html>
<head>
<title>Fan Shape Samples - AC Diagram</title>
<style>
body { background: #0a1520; color: #e0e8f0; font-family: 'Segoe UI', sans-serif; padding: 30px; }
h1 { color: #00b4d8; margin-bottom: 5px; }
h2 { color: #8899aa; font-size: 1em; margin-top: 30px; }
.sample { display: inline-block; margin: 20px; vertical-align: top; text-align: center; }
.label { font-size: 0.85em; color: #8899aa; margin-top: 8px; }
svg { background: #0d1a2a; border: 1px solid #2a3a4a; border-radius: 8px; }
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
g[style*="animation"] { transform-box: view-box; }
</style>
</head>
<body>
<h1>Animated Fan Samples (Fixed)</h1>
<p style="color:#8899aa;">5-blade propeller fans — blades drawn relative to center (0,0) with group translate</p>

<h2>EVAP FAN — Animated (2s)</h2>
<div class="sample">
<svg width="120" height="80" viewBox="0 0 120 80">
  <circle cx="60" cy="40" r="28" fill="none" stroke="#4488aa" stroke-width="1.5"/>
  <g style="animation: spin 2s linear infinite; transform-origin: 60px 40px;">
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6" transform="rotate(72 60 40)"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6" transform="rotate(144 60 40)"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6" transform="rotate(216 60 40)"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6" transform="rotate(288 60 40)"/>
  </g>
  <circle cx="60" cy="40" r="5" fill="#4488aa"/>
  <text x="60" y="76" fill="#8899aa" font-size="8" font-weight="bold" text-anchor="middle">EVAP FAN</text>
</svg>
<div class="label">2s rotation</div>
</div>

<h2>EVAP FAN — Fast (0.8s)</h2>
<div class="sample">
<svg width="120" height="80" viewBox="0 0 120 80">
  <circle cx="60" cy="40" r="28" fill="none" stroke="#4488aa" stroke-width="1.5"/>
  <g style="animation: spin 0.8s linear infinite; transform-origin: 60px 40px;">
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6" transform="rotate(72 60 40)"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6" transform="rotate(144 60 40)"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6" transform="rotate(216 60 40)"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6" transform="rotate(288 60 40)"/>
  </g>
  <circle cx="60" cy="40" r="5" fill="#4488aa"/>
  <text x="60" y="76" fill="#8899aa" font-size="8" font-weight="bold" text-anchor="middle">EVAP FAN</text>
</svg>
<div class="label">0.8s fast</div>
</div>

<h2>COND FAN — Animated (2s, orange)</h2>
<div class="sample">
<svg width="120" height="80" viewBox="0 0 120 80">
  <circle cx="60" cy="40" r="28" fill="none" stroke="#aa6633" stroke-width="1.5"/>
  <g style="animation: spin 2s linear infinite; transform-origin: 60px 40px;">
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#aa6633" opacity="0.6"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#aa6633" opacity="0.6" transform="rotate(72 60 40)"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#aa6633" opacity="0.6" transform="rotate(144 60 40)"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#aa6633" opacity="0.6" transform="rotate(216 60 40)"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#aa6633" opacity="0.6" transform="rotate(288 60 40)"/>
  </g>
  <circle cx="60" cy="40" r="5" fill="#aa6633"/>
  <text x="60" y="76" fill="#aa6633" font-size="8" font-weight="bold" text-anchor="middle">COND FAN</text>
</svg>
<div class="label">Orange 2s</div>
</div>

<h2>Slow idle (4s)</h2>
<div class="sample">
<svg width="120" height="80" viewBox="0 0 120 80">
  <circle cx="60" cy="40" r="28" fill="none" stroke="#4488aa" stroke-width="1.5"/>
  <g style="animation: spin 4s linear infinite; transform-origin: 60px 40px;">
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6" transform="rotate(72 60 40)"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6" transform="rotate(144 60 40)"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6" transform="rotate(216 60 40)"/>
    <ellipse cx="60" cy="26" rx="7" ry="14" fill="#4488aa" opacity="0.6" transform="rotate(288 60 40)"/>
  </g>
  <circle cx="60" cy="40" r="5" fill="#4488aa"/>
  <text x="60" y="76" fill="#8899aa" font-size="8" font-weight="bold" text-anchor="middle">EVAP FAN</text>
</svg>
<div class="label">4s idle</div>
</div>

<h2>Comparison: Before vs After</h2>
<svg width="300" height="120" viewBox="0 0 300 120" style="margin:20px;">
  <text x="70" y="15" fill="#667788" font-size="9" text-anchor="middle">Before (box):</text>
  <rect x="20" y="25" width="100" height="45" rx="8" fill="#0a1a2a" stroke="#4488aa" stroke-width="2"/>
  <text x="70" y="45" fill="#4488aa" font-size="9" font-weight="bold" text-anchor="middle">EVAP FAN</text>
  <text x="70" y="58" fill="#8899aa" font-size="7" text-anchor="middle">Blower</text>

  <text x="230" y="15" fill="#667788" font-size="9" text-anchor="middle">After (animated fan):</text>
  <circle cx="230" cy="48" r="22" fill="none" stroke="#4488aa" stroke-width="1.5"/>
  <g style="animation: spin 2s linear infinite; transform-origin: 230px 48px;">
    <ellipse cx="230" cy="37" rx="5.5" ry="11" fill="#4488aa" opacity="0.55"/>
    <ellipse cx="230" cy="37" rx="5.5" ry="11" fill="#4488aa" opacity="0.55" transform="rotate(72 230 48)"/>
    <ellipse cx="230" cy="37" rx="5.5" ry="11" fill="#4488aa" opacity="0.55" transform="rotate(144 230 48)"/>
    <ellipse cx="230" cy="37" rx="5.5" ry="11" fill="#4488aa" opacity="0.55" transform="rotate(216 230 48)"/>
    <ellipse cx="230" cy="37" rx="5.5" ry="11" fill="#4488aa" opacity="0.55" transform="rotate(288 230 48)"/>
  </g>
  <circle cx="230" cy="48" r="3" fill="#4488aa"/>
  <text x="230" y="78" fill="#8899aa" font-size="7" font-weight="bold" text-anchor="middle">EVAP FAN</text>
  <text x="230" y="88" fill="#8899aa" font-size="6" text-anchor="middle">Blower</text>
  <text x="155" y="52" fill="#00b4d8" font-size="16">&#8594;</text>
</svg>

</body>
</html>
